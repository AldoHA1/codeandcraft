<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Nuevo contacto — Code &amp; Craft</title>
    <!--[if mso]>
      <style type="text/css">
        body, table, td { font-family: Arial, Helvetica, sans-serif !important; }
      </style>
    <![endif]-->
  </head>
  <body style="margin:0; padding:0; background-color:#FAF6F0; font-family: 'Inter', Arial, Helvetica, sans-serif; color:#2E1D42;">
    <!-- Preheader (hidden) -->
    <div style="display:none; max-height:0; overflow:hidden; mso-hide:all;">
      Nuevo mensaje desde el formulario de contacto.
    </div>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#FAF6F0; padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="width:100%; max-width:560px; background-color:#FFFFFF; border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(46,29,66,0.06);">

            <!-- Accent bar -->
            <tr>
              <td style="height:4px; background:linear-gradient(90deg,#492E65,#6E296C,#D47D18); font-size:0; line-height:0;">&nbsp;</td>
            </tr>

            <!-- Header -->
            <tr>
              <td style="padding:32px 32px 8px 32px;">
                <p style="margin:0 0 4px 0; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:#6E296C; font-weight:700;">
                  Code &amp; Craft
                </p>
                <h1 style="margin:0; font-family:'Manrope', Arial, Helvetica, sans-serif; font-size:22px; font-weight:800; color:#492E65; letter-spacing:-0.3px;">
                  Nuevo mensaje de contacto
                </h1>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding:20px 32px 8px 32px;">
                <div style="height:1px; background-color:#EDE0CC; line-height:1px; font-size:0;">&nbsp;</div>
              </td>
            </tr>

            <!-- Fields -->
            <tr>
              <td style="padding:8px 32px 0 32px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td style="padding:12px 0;">
                      <p style="margin:0 0 4px 0; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#5A4A6B; font-weight:700;">Nombre</p>
                      <p style="margin:0; font-size:16px; color:#2E1D42; font-weight:600;">{{name}}</p>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:12px 0;">
                      <p style="margin:0 0 4px 0; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#5A4A6B; font-weight:700;">Correo</p>
                      <p style="margin:0; font-size:16px;">
                        <a href="mailto:{{email}}" style="color:#6E296C; text-decoration:none; font-weight:600;">{{email}}</a>
                      </p>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:12px 0 20px 0;">
                      <p style="margin:0 0 6px 0; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#5A4A6B; font-weight:700;">Motivo</p>
                      <p style="margin:0; font-size:15px; line-height:1.6; color:#2E1D42; white-space:pre-wrap;">{{message}}</p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- CTA -->
            <tr>
              <td style="padding:8px 32px 32px 32px;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td style="background-color:#492E65; border-radius:8px;">
                      <a href="mailto:{{email}}"
                        style="display:inline-block; padding:12px 22px; font-family:'Inter', Arial, Helvetica, sans-serif; font-size:14px; font-weight:700; color:#FFFFFF; text-decoration:none; letter-spacing:0.2px;">
                        Responder a {{name}}
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding:20px 32px 28px 32px; border-top:1px solid #EDE0CC;">
                <p style="margin:0; font-size:12px; color:#5A4A6B; line-height:1.6;">
                  Enviado desde el formulario de contacto de
                  <a href="https://codeandcraftcr.com" style="color:#6E296C; text-decoration:none; font-weight:600;">codeandcraftcr.com</a>.
                </p>
                <p style="margin:6px 0 0 0; font-size:11px; color:#8A7A9C;">
                  Notificación automática · info@codeandcraftcr.com
                </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
